backend:
  name: git-gateway
  branch: main

site_url: https://YOUR-SITE.netlify.app
display_url: https://YOUR-SITE.netlify.app/admin

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "articles"
    label: "Articles"
    folder: "content/articles"
    create: true

    fields:
      - { label: "Title", name: "title", widget: "string" }

