<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Manager</title>
</head>

<body>

  <!-- Netlify Identity (REQUIRED) -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

  <!-- Netlify CMS -->
  <script src="https://unpkg.com/netlify-cms@^2.0.0/dist/netlify-cms.js"></script>

  <script>
    // CRITICAL: ensure CMS initializes Identity correctly
    if (window.netlifyIdentity) {

      // When user logs in, ALWAYS force return to /admin
      window.netlifyIdentity.on("login", () => {
        document.location.href = "/admin/";
      });

      // When CMS initializes, attach identity listener
      window.netlifyIdentity.on("init", user => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.href = "/admin/";
          });
        }
      });

      // Handle recovery links (forgot password)
      window.netlifyIdentity.on("recover", () => {
        document.location.href = "/admin/";
      });

      // Handle confirmation links
      window.netlifyIdentity.on("confirm", () => {
        document.location.href = "/admin/";
      });
    }
  </script>

</body>
</html>
