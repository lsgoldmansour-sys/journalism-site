<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Manager</title>
</head>

<body>

  <!-- Netlify Identity Widget (must load first) -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

  <!-- Netlify CMS -->
  <script src="https://unpkg.com/netlify-cms@^2.0.0/dist/netlify-cms.js"></script>

  <script>
    // Ensure Identity is available
    if (window.netlifyIdentity) {

      // Initialize Identity
      window.netlifyIdentity.on("init", user => {
        // If user logs in from email link or modal
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            // Always return to admin after login
            document.location.href = "/admin/";
          });
        }
      });

      // Handle login event (covers email + password + magic link)
      window.netlifyIdentity.on("login", () => {
        document.location.href = "/admin/";
      });

      // Handle logout cleanly
      window.netlifyIdentity.on("logout", () => {
        document.location.href = "/";
      });
    }
  </script>

</body>
</html>
