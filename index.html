<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luca Goldmansour</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#0b0b0b;
  color:#f2f2f2;
}

section{
  max-width:1100px;
  margin:auto;
  padding:60px 20px;
}

.card{
  background:#121212;
  border:1px solid #222;
  border-radius:8px;
  overflow:hidden;
  margin-bottom:12px;
  padding:12px;
}

.card a{
  color:white;
  text-decoration:none;
  font-weight:600;
}

.meta{
  font-size:12px;
  color:#aaa;
}

.filters button{
  margin:4px;
  padding:6px 10px;
  background:#111;
  border:1px solid #333;
  color:#fff;
  cursor:pointer;
}
</style>
</head>

<body>

<section>
<h1>Editorial Archive</h1>

<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
  <div style="color:#aaa;font-size:12px;">View Mode</div>
  <div>
    <button onclick="setMode('newspaper')">Newspaper</button>
    <button onclick="setMode('feed')">Feed</button>
  </div>
</div>

<div class="filters" id="filters"></div>
<div id="grid"></div>
<div id="pagination"></div>
</section>

<script>

/* =========================
   URL STATE (SAFE INIT)
========================= */

const urlParams = new URLSearchParams(window.location.search);

let currentPage = parseInt(urlParams.get("page")) || 1;
let filter = urlParams.get("category") || "All";
let viewMode = urlParams.get("mode") || "newspaper";

const PAGE_SIZE = 12;

/* =========================
   FULL ARCHIVE RESTORED
========================= */

const articles = [

{t:"CUNY Is Investigating Student Government Leaders for Boycotting Israel",c:"Palestine",o:"The Nation",l:"https://www.thenation.com/article/activism/cuny-title-vi-investigation-palestine-student-government-boycott-israel/"},
{t:"CUNY Faculty Are Still Determined to Hire Palestinian Studies Scholars",c:"Education",o:"The Nation",l:"https://www.thenation.com/article/activism/cuny-hunter-college-palestinian-studies-job-hochul/"},
{t:"Mahmoud Khalil Is “Ready to Fight” His Unlawful Detention",c:"Palestine",o:"The Nation",l:"https://www.thenation.com/article/politics/mahmoud-khalil-shezza-abboushi-dallal-interview/"},
{t:"CUNY’s Repression of Pro-Palestine Students Continues in Front of Congress",c:"Palestine",o:"The Nation",l:"https://www.thenation.com/article/politics/cuny-house-republicans-hearing-repression/"},

{t:"Blaming Workers, Hiding Profits in Primetime Inflation Coverage",c:"Media Criticism",o:"FAIR",l:"https://fair.org/home/blaming-workers-hiding-profits-in-primetime-inflation-coverage/"},
{t:"‘Disinformation’ Label Serves to Marginalize Crucial Ukraine Facts",c:"Media Criticism",o:"FAIR",l:"https://fair.org/home/disinformation-label-serves-to-marginalize-crucial-ukraine-facts/"},
{t:"Counting the Victims of Israel’s War on Gaza Is Low on Media’s Priority List",c:"Media Criticism",o:"FAIR",l:"https://fair.org/home/counting-the-victims-of-israels-war-on-gaza-is-low-on-medias-priority-list/"},

{t:"Kingston Agreed the Rent Was Too Damn High—So It Lowered It",c:"Housing",o:"Shelterforce",l:"https://shelterforce.org/2024/10/11/kingston-agreed-the-rent-was-too-damn-high-so-it-lowered-it/"}

];

/* Featured hook (SAFE, NON-DESTRUCTIVE) */
const featured = [
  "CUNY Is Investigating Student Government Leaders for Boycotting Israel"
];

/* =========================
   CATEGORY FILTERS
========================= */

const cats = ["All", ...new Set(articles.map(a => a.c))];

const f = document.getElementById("filters");

cats.forEach(x=>{
  const b = document.createElement("button");
  b.textContent = x;

  b.onclick = () => {
    filter = x;
    currentPage = 1;
    updateURL();
    render();
  };

  f.appendChild(b);
});

/* =========================
   MODE TOGGLE
========================= */

function setMode(mode){
  const params = new URLSearchParams(window.location.search);
  params.set("mode", mode);
  window.location.search = params.toString();
}

/* =========================
   URL UPDATE
========================= */

function updateURL(){
  const params = new URLSearchParams();

  params.set("page", currentPage);
  params.set("category", filter);
  params.set("mode", viewMode);

  window.history.replaceState({}, "", "?" + params.toString());
}

/* =========================
   PAGINATION
========================= */

function nextPage(totalPages){
  if(currentPage < totalPages){
    currentPage++;
    updateURL();
    render();
  }
}

function prevPage(){
  if(currentPage > 1){
    currentPage--;
    updateURL();
    render();
  }
}

/* =========================
   RENDER
========================= */

function render(){
  const g = document.getElementById("grid");
  g.innerHTML = "";

  const filtered = articles.filter(a => filter === "All" || a.c === filter);

  const totalPages = Math.ceil(filtered.length / PAGE_SIZE);

  if(currentPage > totalPages) currentPage = totalPages || 1;

  const start = (currentPage - 1) * PAGE_SIZE;
  const pageItems = filtered.slice(start, start + PAGE_SIZE);

  pageItems.forEach(a => {

    const isFeatured = featured.includes(a.t);

    g.innerHTML += `
      <div class="card">
        <div class="meta">${a.c} • ${a.o}</div>
        <a href="${a.l}" target="_blank">${a.t}</a>
      </div>
    `;
  });

  renderPagination(totalPages);
}

/* =========================
   PAGINATION UI
========================= */

function renderPagination(totalPages){

  const el = document.getElementById("pagination");

  el.innerHTML = `
    <button onclick="prevPage()">←</button>
    <span style="margin:0 10px;color:#aaa;font-size:12px;">
      Page ${currentPage} / ${totalPages || 1}
    </span>
    <button onclick="nextPage(${totalPages})">→</button>
  `;
}

/* INIT */
render();

</script>

</body>
</html>
